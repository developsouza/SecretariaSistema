<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f6ef7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Documento (pagina branca com orelha dobrada) -->
  <rect x="5" y="4" width="18" height="24" rx="2" fill="white" fill-opacity="0.97"/>
  <!-- Orelha dobrada (canto superior direito) -->
  <path d="M18 4 L23 4 L23 9 Z" fill="#e0e7ff"/>
  <path d="M18 4 L18 9 L23 9" fill="none" stroke="#c7d2fe" stroke-width="0.8"/>

  <!-- Faixa cabecalho (topo do documento) -->
  <rect x="5" y="4" width="13" height="5.5" rx="2" fill="#818cf8" fill-opacity="0.55"/>
  <rect x="5" y="7" width="13" height="2.5" fill="#818cf8" fill-opacity="0.55"/>

  <!-- Bullet + linha 1 -->
  <circle cx="8.2" cy="14" r="1.1" fill="#4f6ef7"/>
  <rect x="10.5" y="13.25" width="9" height="1.5" rx="0.75" fill="#818cf8"/>

  <!-- Bullet + linha 2 -->
  <circle cx="8.2" cy="18" r="1.1" fill="#818cf8"/>
  <rect x="10.5" y="17.25" width="9" height="1.5" rx="0.75" fill="#c7d2fe"/>

  <!-- Bullet + linha 3 -->
  <circle cx="8.2" cy="22" r="1.1" fill="#818cf8"/>
  <rect x="10.5" y="21.25" width="6.5" height="1.5" rx="0.75" fill="#c7d2fe"/>

</svg>