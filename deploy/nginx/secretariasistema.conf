# Configuração NGINX para SecretariaSistema
# Arquivo: /etc/nginx/sites-available/secretariasistema

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name secretariasistema.com.br www.secretariasistema.com.br;
    return 301 https://$host$request_uri;
}

# Servidor principal HTTPS
server {
    listen 443 ssl http2;
    server_name secretariasistema.com.br www.secretariasistema.com.br;

    # ── SSL (Let's Encrypt via Certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/secretariasistema.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secretariasistema.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── Segurança ─────────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"  always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self';" always;

    # ── OCSP Stapling ────────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Upload máximo ─────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ── API Backend (proxy reverso → Node.js :3001) ───────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── Arquivos de upload ────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── Frontend React (arquivos estáticos) ───────────────────────────────
    root /var/www/secretariasistema/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/secretaria_access.log;
    error_log  /var/log/nginx/secretaria_error.log;
}
