# Configuração NGINX — Site Assembleia de Deus em Jacumã
# Arquivo: /etc/nginx/sites-available/adjacuma

# Redireciona HTTP → HTTPS e apex → www
server {
    listen 80;
    server_name adjacuma.com.br www.adjacuma.com.br;
    return 301 https://www.adjacuma.com.br$request_uri;
}

# Redireciona apex HTTPS → www
server {
    listen 443 ssl http2;
    server_name adjacuma.com.br;

    ssl_certificate     /etc/letsencrypt/live/adjacuma.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adjacuma.com.br/privkey.pem;

    return 301 https://www.adjacuma.com.br$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    server_name www.adjacuma.com.br;

    # ── SSL (Let's Encrypt via Certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/adjacuma.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adjacuma.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── Segurança ─────────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"  always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── OCSP Stapling ─────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ── Site estático (React build) ───────────────────────────────────────
    root /var/www/gestao-secretaria/assembleia-jacuma/frontend/dist;
    index index.html;

    # index.html nunca cacheado para garantir novos deploys
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/adjacuma_access.log;
    error_log  /var/log/nginx/adjacuma_error.log;
}
