name: Deploy em Produção

# Dispara automaticamente após push na branch main
on:
    push:
        branches: [main]

    # Permite disparar manualmente pelo painel do GitHub Actions
    workflow_dispatch:

jobs:
    deploy:
        name: SSH → update.sh no servidor
        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  # Tempo máximo para o update.sh terminar (build do frontend pode demorar)
                  command_timeout: 15m
                  script: |
                      # Localiza o update.sh independente do nome do diretório no servidor
                      SCRIPT=""
                      for path in \
                        /var/www/secretariasistema/deploy/update.sh \
                        /var/www/gestao-secretaria/deploy/update.sh; do
                        [ -f "$path" ] && SCRIPT="$path" && break
                      done
                      if [ -z "$SCRIPT" ]; then
                        echo "❌ update.sh não encontrado em nenhum caminho conhecido."
                        exit 1
                      fi
                      echo "▶ Executando $SCRIPT"
                      sudo bash "$SCRIPT"
